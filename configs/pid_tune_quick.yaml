# Fast PID tuning smoke test (inherits v3 dynamics from default structure)

seed: 42
experiment_name: pid_tune_quick

paths:
  raw: data/raw
  synthetic: data/synthetic
  processed: data/processed
  checkpoints: checkpoints
  figures: figures
  scalers: data/processed/scalers
  metadata: data/processed/metadata

simulation:
  dt_seconds: 60.0
  ec_target: 1.2
  ec_safe_min: 0.4
  ec_safe_max: 2.5
  flowrate_min: 0.0
  flowrate_max: 5.0
  duration_min: 0.0
  duration_max: 30.0
  min_time_between_doses: 120.0
  noise_std:
    water_temp: 0.05
    ec: 0.02
    turbidity: 1.0

dynamics:
  ec_healthy_min: 0.75
  ec_soft_limit: 2.2
  ec_hard_limit: 3.0
  baseline_ec_depletion: 0.0038
  biological_uptake_rate: 0.0035
  nutrient_to_ec_gain: 0.095
  immediate_absorption_fraction: 0.28
  delay_kernel: [0.15, 0.25, 0.30, 0.20, 0.10]
  temp_coupling_strength: 2.0
  ambient_temp_mean: 22.0

disturbances:
  heatwave_prob: 0.02
  mixing_noise_std: 0.006

evaluation:
  closed_loop_steps: 500
  pid:
    kp: 2.5
    ki: 0.08
    kd: 0.4

pid_tuning:
  enabled: true
  coarse_search:
    kp_range: [0.5, 6.0]
    ki_range: [0.05, 0.30]
    kd_range: [0.1, 3.0]
    n_kp: 5
    n_ki: 4
    n_kd: 4
    max_evaluations: 24
  refinement:
    top_candidates: 3
    step_kp: 0.5
    step_ki: 0.03
    step_kd: 0.2
  evaluation:
    n_episodes_coarse: 2
    episode_length_coarse: 1200
    disturbance_modes_coarse: [normal]
    n_episodes: 2
    episode_length: 2500
    disturbance_modes: [normal, heatwave]
  validation:
    episode_length: 2500
    long_horizon_length: 3500
    disturbance_modes: [normal, heatwave, nutrient_depletion]
    water_temps: [18.0, 26.0]
    initial_ecs: [1.0, 1.2]
    seeds: [42, 123]
  regulatory_constraints:
    max_ec_mae: 0.08
    max_steady_state_error: 0.05
    min_time_in_band: 0.90
    max_collapse_fraction: 0.0
    reject_settling_timeout: true
    target_band_pct: 0.05
    settling_band: 0.08
    steady_state_tail_fraction: 0.35
  efficiency_weights:
    nutrient_usage: 0.4
    smoothness: 0.2
    aggressive_control: 0.3
  weights:
    ec_mae: 1.0
    overshoot: 0.8
    oscillation: 0.5
    nutrient_usage: 0.4
    collapse_penalty: 1.5
    aggressive_control: 0.3
